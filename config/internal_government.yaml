# Core government departments and common name variants to exclude from stakeholder records.
# Design spec: docs/stakeholder-directory-design.md, Section 2.9.
# Matching is case-insensitive substring: any variant that appears inside the org name
# triggers exclusion. Include abbreviations and common variants, not generic English words.
# Arm's-length bodies (Ofsted, OfS, NHS England) are NOT listed here — they are stakeholders.

internal_government:
  # Prime Minister's Office
  - "Prime Minister's Office"
  - "10 Downing Street"
  - "No. 10"

