# UK ministerial departments — controlled vocabulary for engagement.department.
# Keys are stable snake_case identifiers; names are the canonical display form
# as used on gov.uk. Scope notes are for ingesters and AI passes only.
# Source: https://www.gov.uk/government/organisations (ministerial departments section)
# Last verified: 24 April 2026

departments:
  prime_ministers_office:
    name: "Prime Minister's Office, 10 Downing Street"
    scope: "Cross-government coordination, Cabinet government, PM's policy priorities"

  attorney_generals_office:
    name: "Attorney General's Office"
    scope: "Legal advice to government, Crown Prosecution Service oversight, Serious Fraud Office"

  cabinet_office:
    name: "Cabinet Office"
    scope: "Civil service reform, government efficiency, union policy, elections, procurement"

  department_for_business_and_trade:
    name: "Department for Business & Trade"
    scope: "Business environment, trade policy, export promotion, investment, regulation"

  department_for_culture_media_and_sport:
    name: "Department for Culture, Media & Sport"
    scope: "Arts, culture, broadcasting, sport, tourism, gambling, heritage, creative industries"

  department_for_education:
    name: "Department for Education"
    scope: "Schools, further education, higher education, skills, children's services, early years"

  department_for_energy_security_and_net_zero:
    name: "Department for Energy Security & Net Zero"
    scope: "Energy supply, electricity grid, oil and gas, nuclear, net zero transition"

  department_for_environment_food_and_rural_affairs:
    name: "Department for Environment, Food & Rural Affairs"
    scope: "Environment, food safety, farming, fisheries, rural affairs, animal welfare, flooding"

  department_for_science_innovation_and_technology:
    name: "Department for Science, Innovation & Technology"
