{% extends "base.html" %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="box" style="width: 100%; max-width: 450px; border-top: 5px solid #1c3e6e;">
        <div style="margin-bottom: 24px;">
            <h2 style="margin: 0 0 8px; color: #1c3e6e; font-size: 20px;">Choose a new password</h2>
            <p style="margin: 0; color: #666; font-size: 14px;">Must be at least 8 characters.</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div style="background:#fff3cd; border:1px solid #ffc107; color:#856404; padding:10px 14px; border-radius:4px; margin-bottom:16px; font-size:13px;">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="/reset-password/{{ token }}">
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-weight: 600; color: #1c3e6e; margin-bottom: 8px;">New Password</label>
                <input type="password" name="password" placeholder="••••••••" required minlength="8"
                       style="border: 1px solid #ccd0d5; padding: 12px;">
            </div>

            <div style="margin-bottom: 24px;">
                <label style="display: block; font-weight: 600; color: #1c3e6e; margin-bottom: 8px;">Confirm New Password</label>
                <input type="password" name="confirm_password" placeholder="••••••••" required minlength="8"
                       style="border: 1px solid #ccd0d5; padding: 12px;">
            </div>

            <button type="submit" class="btn-search" style="padding: 14px; font-size: 15px;">
                Set new password
            </button>
        </form>
    </div>
</div>
{% endblock %}
