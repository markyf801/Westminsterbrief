{% extends "base.html" %}
{% block title %}My Preferences — Westminster Brief{% endblock %}

{% block content %}
<div style="max-width:560px; margin:0 auto;">
    <div class="box" style="border-top:5px solid #6f42c1;">

        <h2 style="margin-bottom:6px;">My Preferences</h2>
        <p style="color:#555; font-size:14px; line-height:1.6; margin-bottom:24px;">
            These values are used to pre-fill the Hansard Research search fields when you open the Parliamentary Research tool.
        </p>

        <form method="POST" action="/my_preferences">

            <div style="margin-bottom:18px;">
                <label style="display:block; font-weight:600; margin-bottom:6px; color:#333;">Your Department</label>
                <select name="department" style="width:100%; padding:10px; border-radius:4px; border:1px solid #ccc; font-size:14px;">
                    {% for dept in departments %}
                    <option value="{{ dept }}" {% if pref and pref.department == dept %}selected{% endif %}>{{ dept }}</option>
                    {% endfor %}
                </select>
            </div>

            <div style="margin-bottom:18px;">
                <label style="display:block; font-weight:600; margin-bottom:6px; color:#333;">
                    Policy area
                    <span style="font-weight:normal; color:#888; font-size:12px;">(e.g. Higher Education, SEND)</span>
                </label>
                <input type="text" name="policy_area"
                       value="{{ pref.policy_area if pref else '' }}"
                       placeholder="e.g. Higher Education" maxlength="100"
                       style="width:100%; padding:10px; border-radius:4px; border:1px solid #ccc; font-size:14px; box-sizing:border-box;">
            </div>

            <div style="margin-bottom:28px;">
                <label style="display:block; font-weight:600; margin-bottom:6px; color:#333;">
                    Specific subject
                    <span style="font-weight:normal; color:#888; font-size:12px;">(e.g. free speech, funding)</span>
                </label>
                <input type="text" name="subject"
                       value="{{ pref.subject if pref else '' }}"
                       placeholder="e.g. free speech" maxlength="100"
                       style="width:100%; padding:10px; border-radius:4px; border:1px solid #ccc; font-size:14px; box-sizing:border-box;">
            </div>

            <button type="submit" class="btn-search" style="width:100%; padding:14px; font-size:15px;">
                Save changes
            </button>
        </form>

    </div>
</div>
{% endblock %}
