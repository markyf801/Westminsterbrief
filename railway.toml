[build]
builder = "NIXPACKS"

[deploy]
# startCommand intentionally omitted — set per-service in Railway UI Settings.
# Flask service (jubilant-intuition): gunicorn flask_app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
# Cron services: python scripts/archive_cron.py --days 3 --service-name <name>
# nixpacks.toml clears the build phase so Nixpacks doesn't auto-run gunicorn at build time.
healthcheckPath = "/ping"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
